<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professor Thousand</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --bg: #111417;
        --panel: #1b2228;
        --panel-2: #232d35;
        --screen: #0a0f0a;
        --border: #37444f;
        --text: #e8edf2;
        --muted: #a4b0bb;
        --red: #ff4d4d;
        --green: #69ff8a;
        --yellow: #ffd86b;
        --blue: #79b8ff;
        --shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      }

      body {
        margin: 0;
        background: radial-gradient(
          circle at top,
          #1a232b 0%,
          #111417 45%,
          #0c0f12 100%
        );
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        min-height: 100vh;
        padding: 24px;
      }

      .app {
        max-width: 1120px;
        margin: 0 auto;
      }

      .title {
        text-align: center;
        margin-bottom: 18px;
      }

      .title h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: 1px;
      }

      .title p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .top-bar {
        display: flex;
        justify-content: center;
        margin: 18px 0 22px;
        min-height: 48px;
      }

      .new-game-btn {
        background: var(--blue);
        color: #08131f;
        border: none;
        border-radius: 12px;
        padding: 12px 18px;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
        box-shadow: var(--shadow);
        display: none;
      }

      .new-game-btn.show {
        display: inline-block;
      }

      .new-game-btn:hover {
        filter: brightness(1.07);
      }

      .play-row {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 18px;
        align-items: stretch;
        margin-bottom: 20px;
      }

      .display-card {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
        box-shadow: var(--shadow);
        min-width: 0;
      }

      .display-label {
        color: var(--muted);
        font-size: 0.95rem;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-align: center;
      }

      .calculator-display,
      .guess-input-display {
        width: 100%;
        min-height: 86px;
        border-radius: 14px;
        border: 2px solid #2c3a34;
        background: linear-gradient(180deg, #111711 0%, #091009 100%);
        box-shadow:
          inset 0 0 18px rgba(0, 0, 0, 0.6),
          inset 0 0 1px rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 14px 18px;
        font-family: "Lucida Console", "Courier New", monospace;
        font-size: clamp(2.2rem, 5vw, 3.6rem);
        letter-spacing: 6px;
        overflow: hidden;
        white-space: nowrap;
      }

      .secret-display {
        color: var(--red);
        text-shadow:
          0 0 8px rgba(255, 77, 77, 0.7),
          0 0 16px rgba(255, 77, 77, 0.45);
      }

      .guess-input-display {
        color: var(--green);
        text-shadow:
          0 0 8px rgba(105, 255, 138, 0.7),
          0 0 16px rgba(105, 255, 138, 0.4);
        caret-color: var(--green);
        outline: none;
        appearance: textfield;
      }

      .guess-input-display::placeholder {
        color: rgba(105, 255, 138, 0.35);
        text-shadow: none;
      }

      .guess-input-display::-webkit-outer-spin-button,
      .guess-input-display::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .submit-wrap {
        display: flex;
        align-items: end;
      }

      .guess-btn {
        min-height: 116px;
        padding: 0 26px;
        border-radius: 18px;
        border: none;
        background: var(--yellow);
        color: #241a00;
        font-size: 2rem;
        font-weight: bold;
        cursor: pointer;
        box-shadow: var(--shadow);
        min-width: 150px;
      }

      .guess-btn:hover:not(:disabled) {
        filter: brightness(1.05);
      }

      .guess-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status-row {
        min-height: 28px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 10px;
      }

      .status-message {
        color: var(--yellow);
        font-size: 0.95rem;
        min-height: 20px;
      }

      .professor-box {
        background: rgba(255, 255, 255, 0.04);
        border: 1px dashed rgba(255, 255, 255, 0.16);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 18px;
        min-height: 180px;
        display: grid;
        grid-template-columns: 25% 1fr;
        gap: 16px;
        align-items: center;
      }

      .professor-image-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100%;
      }

      .professor-image {
        width: 100%;
        max-width: 240px;
        height: auto;
        display: block;
        object-fit: contain;
      }

      .professor-text-wrap {
        display: flex;
        align-items: center;
        min-width: 0;
      }

      .prof-text {
        color: var(--text);
        line-height: 1.5;
        font-size: 1.5rem;
        width: 100%;
      }

      .prof-name {
        color: var(--blue);
        font-weight: bold;
      }

      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        margin-bottom: 18px;
      }

      .info-card {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        box-shadow: var(--shadow);
      }

      .section-title {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .guess-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .guess-chip {
        background: rgba(121, 184, 255, 0.12);
        color: #d8ebff;
        border: 1px solid rgba(121, 184, 255, 0.28);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.95rem;
      }

      .remaining-count {
        font-size: clamp(1.6rem, 3vw, 2.4rem);
        font-weight: bold;
        color: var(--green);
        text-align: center;
        line-height: 1.2;
        margin-top: 6px;
      }

      .remaining-caption {
        color: var(--muted);
        font-size: 0.95rem;
        text-align: center;
      }

      .log {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .log-entry {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        box-shadow: var(--shadow);
      }

      .log-entry.win {
        border-color: rgba(105, 255, 138, 0.35);
        background: linear-gradient(
          180deg,
          rgba(25, 55, 31, 0.9),
          rgba(19, 41, 25, 0.95)
        );
      }

      .log-header {
        font-weight: bold;
        margin-bottom: 10px;
        color: var(--blue);
      }

      .log-line {
        margin: 0;
        line-height: 1.5;
      }

      .floating-win {
        position: sticky;
        top: 12px;
        z-index: 20;
        margin-bottom: 16px;
        background: linear-gradient(180deg, #23492c, #18341e);
        border: 1px solid rgba(105, 255, 138, 0.35);
        border-radius: 18px;
        padding: 14px 16px;
        box-shadow: var(--shadow);
        display: none;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }

      .floating-win.show {
        display: flex;
      }

      .floating-win-text {
        line-height: 1.45;
      }

      .dismiss-btn {
        background: transparent;
        color: #dfffe6;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        padding: 6px 10px;
        cursor: pointer;
        font-weight: bold;
      }

      .shake {
        animation: shake 0.34s linear;
      }

      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-8px);
        }
        40% {
          transform: translateX(8px);
        }
        60% {
          transform: translateX(-6px);
        }
        80% {
          transform: translateX(6px);
        }
        100% {
          transform: translateX(0);
        }
      }

      @media (max-width: 860px) {
        .play-row,
        .info-grid {
          grid-template-columns: 1fr;
        }

        .submit-wrap {
          align-items: stretch;
        }

        .guess-btn {
          min-height: 64px;
          width: 100%;
        }

        .professor-box {
          grid-template-columns: 1fr;
          min-height: 0;
        }

        .professor-image-wrap {
          max-width: 180px;
          margin: 0 auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="title">
        <h1>Professor Thousand</h1>
        <p>Guess the professor’s secret number from 1 to 999.</p>
      </div>

      <div id="floatingWin" class="floating-win">
        <div id="floatingWinText" class="floating-win-text"></div>
        <button id="dismissWinBtn" class="dismiss-btn" type="button">
          Dismiss
        </button>
      </div>

      <div class="top-bar">
        <button id="newGameBtn" class="new-game-btn" type="button">
          New Game
        </button>
      </div>

      <div class="play-row">
        <div class="display-card">
          <div class="display-label">Professor Thousand</div>
          <div id="secretDisplay" class="calculator-display secret-display">
            ***
          </div>
        </div>

        <div class="display-card">
          <div class="display-label">Your Guess</div>
          <input
            id="guessInput"
            class="guess-input-display"
            type="text"
            inputmode="numeric"
            maxlength="3"
            placeholder="---"
            autocomplete="off"
          />
        </div>

        <div class="submit-wrap">
          <button id="guessBtn" class="guess-btn" type="button">SUBMIT</button>
        </div>
      </div>

      <div class="status-row">
        <div id="statusMessage" class="status-message"></div>
      </div>

      <div id="professorBox" class="professor-box">
        <div class="professor-image-wrap">
          <img
            src="ProfessorThousand.png"
            alt="Professor Thousand"
            class="professor-image"
          />
        </div>
        <div class="professor-text-wrap">
          <div id="professorText" class="prof-text">
            <span class="prof-name">Professor Thousand:</span> I await your
            first guess.
          </div>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-card">
          <h2 class="section-title">Previous Guesses</h2>
          <div id="guessChipRow" class="guess-chip-row"></div>
        </div>

        <div class="info-card">
          <h2 class="section-title">Numbers Still Possible</h2>
          <div id="remainingCount" class="remaining-count">999</div>
          <div class="remaining-caption">
            Valid, unguessed numbers consistent with all clues so far.
          </div>
        </div>
      </div>

      <div id="log" class="log"></div>
    </div>

    <script>
      const FEEDBACK_FILES = [
        "feedback_identity.txt",
        "feedback_digits.txt",
        "feedback_digit_patterns.txt",
        "feedback_factors.txt",
        "feedback_multiples.txt",
        "feedback_remainders.txt",
      ];

      const THINKING_DELAY = 2000;

      const secretDisplay = document.getElementById("secretDisplay");
      const guessInput = document.getElementById("guessInput");
      const guessBtn = document.getElementById("guessBtn");
      const newGameBtn = document.getElementById("newGameBtn");
      const statusMessage = document.getElementById("statusMessage");
      const professorText = document.getElementById("professorText");
      const guessChipRow = document.getElementById("guessChipRow");
      const remainingCount = document.getElementById("remainingCount");
      const log = document.getElementById("log");
      const floatingWin = document.getElementById("floatingWin");
      const floatingWinText = document.getElementById("floatingWinText");
      const dismissWinBtn = document.getElementById("dismissWinBtn");

      let cluesByNumber = [];
      let clueTextSetsByNumber = [];

      let secretNumber = null;
      let guessCount = 0;
      let previousGuesses = new Set();

      let usedClueTexts = new Set();

      let bestSimilarityRankByCategory = new Map();
      let bestDissimilarityRankByCategory = new Map();

      let requiredDescriptors = new Set();
      let forbiddenDescriptors = new Set();

      let gameReady = false;
      let isThinking = false;
      let gameWon = false;
      let thinkingInterval = null;
      let pendingLogEntry = null;

      init();

      async function init() {
        setInputEnabled(false);
        hideNewGameButton();
        showStatusMessage("Loading clue files...");
        setProfessorText("Loading my notebooks...");
        remainingCount.textContent = "---";

        try {
          const texts = await Promise.all(
            FEEDBACK_FILES.map((path) => fetch(path).then(handleFetchResponse)),
          );

          buildClueDatabase(texts);

          startNewGame();
          gameReady = true;
        } catch (error) {
          console.error(error);
          showStatusMessage("Could not load one or more clue files.");
          addSystemLogEntry(
            "Load Error",
            [
              "I couldn’t load one or more clue files.",
              "Make sure all feedback files and ProfessorThousand.png are in the same folder as this HTML file, and run the page through Live Server or another local server.",
            ],
            true,
          );
          setProfessorText("Something is wrong with my notebooks.");
        }
      }

      async function handleFetchResponse(response) {
        if (!response.ok) {
          throw new Error(
            `Failed to load ${response.url} (${response.status})`,
          );
        }
        return response.text();
      }

      function buildClueDatabase(fileTexts) {
        cluesByNumber = Array.from({ length: 1000 }, () => []);
        const seenKeysByNumber = Array.from({ length: 1000 }, () => new Set());

        for (const text of fileTexts) {
          const parsed = parseFeedbackFile(text);

          for (let n = 1; n <= 999; n++) {
            for (const clue of parsed[n]) {
              const key = `${clue.text}||${clue.category}`;
              if (!seenKeysByNumber[n].has(key)) {
                cluesByNumber[n].push(clue);
                seenKeysByNumber[n].add(key);
              }
            }
          }
        }

        clueTextSetsByNumber = cluesByNumber.map(
          (clues) => new Set(clues.map((clue) => clue.text)),
        );
      }

      function parseFeedbackFile(text) {
        const rows = Array.from({ length: 1000 }, () => []);
        const lines = text
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter((line) => line !== "");

        for (const line of lines) {
          const parts = line.split(",").map((part) => part.trim());
          const number = Number(parts[0]);

          if (!Number.isInteger(number) || number < 1 || number > 999) continue;

          for (let i = 1; i < parts.length; i++) {
            const segment = parts[i];
            if (!segment) continue;

            const pieces = segment
              .split("|")
              .map((piece) => piece.trim())
              .filter(Boolean);
            if (pieces.length === 0) continue;

            const clueText = pieces[0];
            const metadata = {};

            for (let j = 1; j < pieces.length; j++) {
              const [key, value] = pieces[j].split("=");
              if (!key) continue;
              metadata[key.trim()] = (value ?? "").trim();
            }

            rows[number].push({
              text: clueText,
              category: metadata.category || "uncategorized",
              tier: toNumber(metadata.tier, 99),
              rank: toNumber(metadata.rank, 999),
              candissim: metadata.candissim === "1",
              distier: toNumber(metadata.distier, toNumber(metadata.tier, 99)),
              disrank: toNumber(metadata.disrank, toNumber(metadata.rank, 999)),
            });
          }
        }

        return rows;
      }

      function toNumber(value, fallback) {
        const num = Number(value);
        return Number.isFinite(num) ? num : fallback;
      }

      function startNewGame() {
        secretNumber = getRandomInt(1, 999);
        guessCount = 0;
        previousGuesses = new Set();

        usedClueTexts = new Set();

        bestSimilarityRankByCategory = new Map();
        bestDissimilarityRankByCategory = new Map();

        requiredDescriptors = new Set();
        forbiddenDescriptors = new Set();

        pendingLogEntry = null;
        isThinking = false;
        gameWon = false;

        stopThinkingAnimation();
        hideFloatingWin();
        hideNewGameButton();

        secretDisplay.textContent = "***";
        guessInput.value = "";
        clearStatusMessage();
        setProfessorText("I await your first guess.");
        guessChipRow.innerHTML = "";
        log.innerHTML = "";

        setInputEnabled(true);
        updateRemainingCount();

        addSystemLogEntry("New Game", [
          "Professor Thousand has chosen a secret number from 1 to 999.",
          "Enter a guess to begin.",
        ]);

        guessInput.focus();
      }

      newGameBtn.addEventListener("click", startNewGame);
      dismissWinBtn.addEventListener("click", hideFloatingWin);
      guessBtn.addEventListener("click", submitGuess);

      guessInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          submitGuess();
        }
      });

      guessInput.addEventListener("input", () => {
        guessInput.value = guessInput.value.replace(/\D/g, "").slice(0, 3);
        clearStatusMessage();
      });

      async function submitGuess() {
        if (!gameReady || isThinking || gameWon) return;

        const raw = guessInput.value.trim();

        if (!/^\d{1,3}$/.test(raw)) {
          shakeElement(guessInput);
          return;
        }

        const guess = Number(raw);

        if (guess < 1 || guess > 999) {
          shakeElement(guessInput);
          return;
        }

        if (previousGuesses.has(guess)) {
          shakeElement(guessInput);
          showStatusMessage("You already guessed that number.");
          return;
        }

        flushPendingLogEntry();

        previousGuesses.add(guess);
        guessCount++;
        addGuessChip(guess);

        clearStatusMessage();

        if (guess === secretNumber) {
          handleWin(guess);
          updateRemainingCount();
          return;
        }

        setInputEnabled(false);
        startThinkingAnimation();
        await delay(THINKING_DELAY);
        stopThinkingAnimation();

        const feedback = buildFeedbackForGuess(guess);

        if (feedback.similarityClue) {
          debugCandidateClue(feedback.similarityClue, "sim");
        }

        if (feedback.dissimilarityClue) {
          debugCandidateClue(feedback.dissimilarityClue, "dissim");
        }

        if (feedback.similarityClue) {
          usedClueTexts.add(feedback.similarityClue.text);
          requiredDescriptors.add(feedback.similarityClue.text);
          updateBestRank(
            bestSimilarityRankByCategory,
            feedback.similarityClue.category,
            feedback.similarityClue.rank,
          );
        }

        if (feedback.dissimilarityClue) {
          usedClueTexts.add(feedback.dissimilarityClue.text);
          forbiddenDescriptors.add(feedback.dissimilarityClue.text);
          updateBestRank(
            bestDissimilarityRankByCategory,
            feedback.dissimilarityClue.category,
            feedback.dissimilarityClue.disrank,
          );
        }

        setProfessorText(feedback.spokenParagraph);

        pendingLogEntry = {
          guessNumber: guessCount,
          guess,
          logParagraph: feedback.logParagraph,
        };

        updateRemainingCount();

        setInputEnabled(true);
        guessInput.value = "";
        guessInput.focus();
      }

      function buildFeedbackForGuess(guess) {
        const similarityClue = chooseSimilarityClue(guess);
        const dissimilarityClue = chooseDissimilarityClue(guess);

        let similarityLogLine;
        let differenceLogLine;
        let spokenParagraph;

        if (similarityClue) {
          similarityLogLine = `My number ${similarityClue.text}.`;
        } else {
          similarityLogLine = `My number shares something in common with your guess.`;
        }

        if (dissimilarityClue) {
          differenceLogLine = `My number ${invertDescriptor(dissimilarityClue.text)}.`;
        } else {
          differenceLogLine = `My number differs from your guess in at least one way.`;
        }

        if (similarityClue && dissimilarityClue) {
          spokenParagraph =
            `That's not right, but my number, like the number you guessed, ${similarityClue.text}. ` +
            `However, you guessed a number that ${dissimilarityClue.text}, but my number ${invertDescriptor(dissimilarityClue.text)}.`;
        } else if (similarityClue && !dissimilarityClue) {
          spokenParagraph =
            `That's not right, but my number, like the number you guessed, ${similarityClue.text}. ` +
            `However, your guess still differs from my number in at least one way.`;
        } else if (!similarityClue && dissimilarityClue) {
          spokenParagraph =
            `That's not right, but my number does share something in common with the number you guessed. ` +
            `However, you guessed a number that ${dissimilarityClue.text}, but my number ${invertDescriptor(dissimilarityClue.text)}.`;
        } else {
          spokenParagraph =
            `That's not right, but my number does share something in common with the number you guessed. ` +
            `However, your guess still differs from my number in at least one way.`;
        }

        return {
          similarityClue,
          dissimilarityClue,
          spokenParagraph,
          logParagraph: `${similarityLogLine} ${differenceLogLine}`,
        };
      }

      function chooseSimilarityClue(guess) {
        const secretClues = cluesByNumber[secretNumber];
        const guessTexts = clueTextSetsByNumber[guess];

        const structurallyEligible = secretClues.filter((clue) => {
          if (!guessTexts.has(clue.text)) return false;
          if (usedClueTexts.has(clue.text)) return false;

          const bestShownRank = bestSimilarityRankByCategory.get(clue.category);
          if (bestShownRank != null && clue.rank >= bestShownRank) return false;

          return true;
        });

        if (structurallyEligible.length === 0) return null;

        const bestTier = Math.min(
          ...structurallyEligible.map((clue) => clue.tier),
        );
        const tierPool = structurallyEligible.filter(
          (clue) => clue.tier === bestTier,
        );

        const bestPerCategory = keepBestPerCategory(tierPool, "rank");
        const informative = bestPerCategory.filter((clue) =>
          similarityWouldReducePool(clue),
        );

        if (informative.length === 0) return null;

        return pickRandom(informative);
      }

      function chooseDissimilarityClue(guess) {
        const guessClues = cluesByNumber[guess];
        const secretTexts = clueTextSetsByNumber[secretNumber];

        const structurallyEligible = guessClues.filter((clue) => {
          if (!clue.candissim) return false;
          if (secretTexts.has(clue.text)) return false;
          if (usedClueTexts.has(clue.text)) return false;

          const bestShownRank = bestDissimilarityRankByCategory.get(
            clue.category,
          );
          if (bestShownRank != null && clue.disrank >= bestShownRank)
            return false;

          return true;
        });

        if (structurallyEligible.length === 0) return null;

        const bestTier = Math.min(
          ...structurallyEligible.map((clue) => clue.distier),
        );
        const tierPool = structurallyEligible.filter(
          (clue) => clue.distier === bestTier,
        );

        const bestPerCategory = keepBestPerCategory(tierPool, "disrank");
        const informative = bestPerCategory.filter((clue) =>
          dissimilarityWouldReducePool(clue),
        );

        if (informative.length === 0) return null;

        return pickRandom(informative);
      }

      function keepBestPerCategory(clues, rankField) {
        const bestByCategory = new Map();

        for (const clue of clues) {
          const existing = bestByCategory.get(clue.category);
          if (!existing || clue[rankField] < existing[rankField]) {
            bestByCategory.set(clue.category, clue);
          }
        }

        return Array.from(bestByCategory.values());
      }

      function similarityWouldReducePool(clue) {
        if (requiredDescriptors.has(clue.text)) return false;

        const before = countCurrentPossibleUnguessed();
        const after = countPossibleUnguessedWithExtraRequired(clue.text);

        return after < before;
      }

      function dissimilarityWouldReducePool(clue) {
        if (forbiddenDescriptors.has(clue.text)) return false;

        const before = countCurrentPossibleUnguessed();
        const after = countPossibleUnguessedWithExtraForbidden(clue.text);

        return after < before;
      }

      function countCurrentPossibleUnguessed() {
        let count = 0;

        for (let n = 1; n <= 999; n++) {
          if (previousGuesses.has(n)) continue;
          if (!isCandidateStillPossible(n)) continue;
          count++;
        }

        return count;
      }

      function countPossibleUnguessedWithExtraRequired(extraRequired) {
        let count = 0;

        for (let n = 1; n <= 999; n++) {
          if (previousGuesses.has(n)) continue;
          if (!isCandidateStillPossibleWithExtras(n, extraRequired, null))
            continue;
          count++;
        }

        return count;
      }

      function countPossibleUnguessedWithExtraForbidden(extraForbidden) {
        let count = 0;

        for (let n = 1; n <= 999; n++) {
          if (previousGuesses.has(n)) continue;
          if (!isCandidateStillPossibleWithExtras(n, null, extraForbidden))
            continue;
          count++;
        }

        return count;
      }

      function isCandidateStillPossible(number) {
        return isCandidateStillPossibleWithExtras(number, null, null);
      }

      function isCandidateStillPossibleWithExtras(
        number,
        extraRequired,
        extraForbidden,
      ) {
        const textSet = clueTextSetsByNumber[number];

        for (const required of requiredDescriptors) {
          if (!textSet.has(required)) return false;
        }

        for (const forbidden of forbiddenDescriptors) {
          if (textSet.has(forbidden)) return false;
        }

        if (extraRequired && !textSet.has(extraRequired)) return false;
        if (extraForbidden && textSet.has(extraForbidden)) return false;

        return true;
      }

      function updateRemainingCount() {
        remainingCount.textContent = String(countCurrentPossibleUnguessed());
      }

      function updateBestRank(rankMap, category, rank) {
        const existing = rankMap.get(category);
        if (existing == null || rank < existing) {
          rankMap.set(category, rank);
        }
      }

      function invertDescriptor(descriptor) {
        if (descriptor.startsWith("is ")) {
          return "is not " + descriptor.slice(3);
        }

        if (descriptor.startsWith("has ")) {
          return "doesn't have " + descriptor.slice(4);
        }

        return "is not described by: " + descriptor;
      }

      function handleWin(guess) {
        gameWon = true;
        secretDisplay.textContent = formatThreeDigits(secretNumber);
        guessInput.value = String(guess);

        const winParagraph =
          `Excellent! You found my secret number: ${formatThreeDigits(secretNumber)}. ` +
          `You solved it in ${guessCount} ${guessCount === 1 ? "guess" : "guesses"}.`;

        setProfessorText(winParagraph);
        addWinLogEntry(guessCount, guess, winParagraph);
        showFloatingWin(winParagraph);
        showNewGameButton();

        setInputEnabled(false);
        pendingLogEntry = null;
      }

      function flushPendingLogEntry() {
        if (!pendingLogEntry) return;

        addGuessLogEntry(
          pendingLogEntry.guessNumber,
          pendingLogEntry.guess,
          pendingLogEntry.logParagraph,
        );

        pendingLogEntry = null;
      }

      function setProfessorText(text) {
        professorText.innerHTML = `<span class="prof-name">Professor Thousand:</span> ${escapeHtml(text)}`;
      }

      function addGuessChip(guess) {
        const chip = document.createElement("div");
        chip.className = "guess-chip";
        chip.textContent = guess;
        guessChipRow.prepend(chip);
      }

      function addGuessLogEntry(guessNumber, guess, paragraph) {
        const entry = document.createElement("div");
        entry.className = "log-entry";

        entry.innerHTML = `
        <div class="log-header">Guess #${guessNumber}, ${guess}:</div>
        <p class="log-line">${escapeHtml(paragraph)}</p>
      `;

        log.prepend(entry);
      }

      function addWinLogEntry(guessNumber, guess, paragraph) {
        const entry = document.createElement("div");
        entry.className = "log-entry win";

        entry.innerHTML = `
        <div class="log-header">Guess #${guessNumber}, ${guess}:</div>
        <p class="log-line">${escapeHtml(paragraph)}</p>
      `;

        log.prepend(entry);
      }

      function addSystemLogEntry(header, lines, isError = false) {
        const entry = document.createElement("div");
        entry.className = "log-entry";

        if (isError) {
          entry.style.borderColor = "rgba(255, 77, 77, 0.35)";
        }

        entry.innerHTML = `
        <div class="log-header">${escapeHtml(header)}</div>
        ${lines.map((line) => `<p class="log-line">${escapeHtml(line)}</p>`).join("")}
      `;

        log.prepend(entry);
      }

      function showFloatingWin(text) {
        floatingWinText.textContent = text;
        floatingWin.classList.add("show");
      }

      function hideFloatingWin() {
        floatingWin.classList.remove("show");
      }

      function showNewGameButton() {
        newGameBtn.classList.add("show");
      }

      function hideNewGameButton() {
        newGameBtn.classList.remove("show");
      }

      function showStatusMessage(message) {
        statusMessage.textContent = message;
      }

      function clearStatusMessage() {
        statusMessage.textContent = "";
      }

      function setInputEnabled(enabled) {
        guessInput.disabled = !enabled;
        guessBtn.disabled = !enabled;
      }

      function startThinkingAnimation() {
        isThinking = true;

        const frames = ["Hmmm", "Hmmm.", "Hmmm..", "Hmmm..."];
        let index = 0;
        setProfessorText(frames[0]);

        thinkingInterval = setInterval(() => {
          index = (index + 1) % frames.length;
          setProfessorText(frames[index]);
        }, 350);
      }

      function stopThinkingAnimation() {
        isThinking = false;

        if (thinkingInterval) {
          clearInterval(thinkingInterval);
          thinkingInterval = null;
        }
      }

      function shakeElement(element) {
        element.classList.remove("shake");
        void element.offsetWidth;
        element.classList.add("shake");
      }

      function formatThreeDigits(number) {
        return String(number).padStart(3, "0");
      }

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function pickRandom(array) {
        return array[Math.floor(Math.random() * array.length)];
      }

      function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function delay(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function getCurrentPossibleNumbers() {
        const nums = [];

        for (let n = 1; n <= 999; n++) {
          if (previousGuesses.has(n)) continue;
          if (!isCandidateStillPossible(n)) continue;
          nums.push(n);
        }

        return nums;
      }

      function getPossibleNumbersWithExtraRequired(extraRequired) {
        const nums = [];

        for (let n = 1; n <= 999; n++) {
          if (previousGuesses.has(n)) continue;
          if (!isCandidateStillPossibleWithExtras(n, extraRequired, null))
            continue;
          nums.push(n);
        }

        return nums;
      }

      function getPossibleNumbersWithExtraForbidden(extraForbidden) {
        const nums = [];

        for (let n = 1; n <= 999; n++) {
          if (previousGuesses.has(n)) continue;
          if (!isCandidateStillPossibleWithExtras(n, null, extraForbidden))
            continue;
          nums.push(n);
        }

        return nums;
      }

      function debugCandidateClue(clue, kind) {
        const before = getCurrentPossibleNumbers();
        const after =
          kind === "sim"
            ? getPossibleNumbersWithExtraRequired(clue.text)
            : getPossibleNumbersWithExtraForbidden(clue.text);

        const removed = before.filter((n) => !after.includes(n));

        console.log("----- DEBUG CLUE -----");
        console.log("Type:", kind);
        console.log("Clue text:", clue.text);
        console.log("Category:", clue.category);
        console.log("Before count:", before.length);
        console.log("After count:", after.length);
        console.log("Removed count:", removed.length);
        console.log("First 50 removed:", removed.slice(0, 50));
        console.log("First 50 remaining after:", after.slice(0, 50));
      }
    </script>
  </body>
